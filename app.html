<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#191919">
<title>HVAC Dubai ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F7F5;
  --surface:#FFFFFF;
  --sidebar:#191919;
  --sidebar-hover:#2C2C2C;
  --sidebar-active:#373737;
  --text:#1A1A1A;
  --muted:#787774;
  --border:#E9E9E7;
  --border-strong:#D3D1CB;
  --blue:#2383E2;
  --blue-l:#EBF3FD;
  --blue-b:#BFDBFE;
  --green:#0F9D58;
  --green-l:#E8F5EE;
  --green-b:#B7DFCA;
  --yellow:#D97706;
  --yellow-l:#FEF3C7;
  --yellow-b:#FDE68A;
  --red:#E03E3E;
  --red-l:#FDEAEA;
  --red-b:#FCCACA;
  --gray:#6B7280;
  --gray-l:#F3F3F1;
  --r:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 32px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

/* SPINNER */
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;flex:1;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);flex:1;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);margin:20px;}
.login-wordmark{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.login-wordmark-icon{width:32px;height:32px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0;}
.login-wordmark-name{font-size:17px;font-weight:700;color:var(--text);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
.login-field{margin-bottom:12px;}
.login-field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;}
.login-field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(35,131,226,.12);background:var(--surface);}
.login-btn-google{width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);padding:10px;border-radius:var(--r);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;transition:background .12s,box-shadow .12s;}
.login-btn-google:hover{background:var(--bg);box-shadow:var(--shadow);}
.login-sep{display:flex;align-items:center;gap:10px;margin:4px 0 12px;color:var(--muted);font-size:12px;}
.login-sep::before,.login-sep::after{content:'';flex:1;height:1px;background:var(--border);}
.login-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:10px;border-radius:var(--r);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;transition:background .12s;}
.login-btn:hover{background:#1a70c7;}
.login-err{margin-top:12px;padding:10px 12px;background:var(--red-l);border:1px solid var(--red-b);border-radius:var(--r);font-size:13px;color:var(--red);display:none;}
.login-ok{margin-top:12px;padding:10px 12px;background:var(--green-l);border:1px solid var(--green-b);border-radius:var(--r);font-size:13px;color:var(--green);display:none;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:100vh;}
.sidebar{width:220px;background:var(--sidebar);flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-top{padding:16px 12px 8px;}
.sidebar-brand{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;margin-bottom:4px;cursor:default;}
.sidebar-brand-icon{width:26px;height:26px;background:#fff;border-radius:5px;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:13px;font-weight:800;flex-shrink:0;}
.sidebar-brand-name{font-size:14px;font-weight:600;color:#fff;line-height:1.2;}
.sidebar-brand-sub{font-size:11px;color:#666;line-height:1;}
.sidebar-nav{flex:1;padding:4px 8px;}
.sidebar-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#555;padding:16px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 8px;cursor:pointer;color:#999;font-size:13.5px;font-weight:500;border:none;border-radius:6px;background:none;width:100%;text-align:left;transition:background .1s,color .1s;margin-bottom:1px;}
.nav-item:hover{color:#E8E8E8;background:var(--sidebar-hover);}
.nav-item.active{color:#fff;background:var(--sidebar-active);}
.nav-item .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:8px 12px 12px;border-top:1px solid #2C2C2C;margin-top:auto;}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px;border-radius:6px;cursor:default;}
.sidebar-avatar{width:28px;height:28px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
.sidebar-uname{font-size:12px;font-weight:500;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;}
.sidebar-logout{background:none;border:none;color:#666;font-size:11px;cursor:pointer;padding:2px 0;font-family:inherit;text-align:left;}
.sidebar-logout:hover{color:#ccc;}
.main{flex:1;overflow-y:auto;padding:28px 32px;padding-bottom:40px;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.page-title{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--text);}
.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.page-hd .page-title{margin-bottom:0;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:box-shadow .12s,border-color .12s;}
.stat-card:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong);}
.stat-card .lbl{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:8px;}
.stat-card .val{font-size:28px;font-weight:700;line-height:1;color:var(--text);}
.stat-card .sub{font-size:11px;color:var(--blue);margin-top:5px;font-weight:500;}

/* TABLE CARD */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.table-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.table-header h3{font-size:14px;font-weight:600;}
.btn-p{background:var(--blue);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;transition:background .12s;}
.btn-p:hover{background:#1a70c7;}
.btn-p.gray{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-p.gray:hover{background:var(--bg);color:var(--text);}
.filter-bar{display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
.filter-bar input{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;transition:border-color .15s;}
.filter-bar select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;color:var(--text);outline:none;-webkit-appearance:none;cursor:pointer;}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--blue);}
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:440px;}
thead th{padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .08s;}
tbody tr:hover{background:#FBFBF9;}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:11px 14px;color:var(--text);vertical-align:middle;font-size:13px;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:13px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.bg{background:var(--blue-l);color:var(--blue);}
.gy{background:var(--gray-l);color:var(--gray);}
.gr{background:var(--green-l);color:var(--green);}
.ye{background:var(--yellow-l);color:var(--yellow);}
.re{background:var(--red-l);color:var(--red);}

/* ACTION BUTTONS */
.act{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:5px;font-size:11px;font-family:inherit;cursor:pointer;margin-right:4px;white-space:nowrap;font-weight:500;transition:all .1s;}
.act:hover{background:var(--bg);color:var(--text);}
.act.blue{color:var(--blue);border-color:var(--blue-b);}.act.blue:hover{background:var(--blue-l);}
.contact-link{color:var(--blue);text-decoration:none;font-weight:500;}
.contact-link:hover{text-decoration:underline;}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:12px 12px 0 0;padding:6px 24px 40px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.drag{width:36px;height:3px;background:var(--border);border-radius:2px;margin:12px auto 18px;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.msec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:18px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(35,131,226,.1);background:var(--surface);}
.form-row textarea{resize:none;min-height:72px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g2 .form-row{margin-bottom:0;}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.g3 .form-row{margin-bottom:0;}
.mact{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:6px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:background .12s;}
.btn-cancel:hover{background:var(--border);}
.btn-save{flex:2;background:var(--blue);color:#fff;border:none;padding:10px;border-radius:6px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:background .12s;}
.btn-save:hover{background:#1a70c7;}
.btn-del{background:var(--red-l);color:var(--red);border:none;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.btn-del:hover{background:#f8d7d7;}

/* LIGNES DEVIS/FACTURE */
.art-sec{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;}
.art-sec-t{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;}
.art-line{display:grid;grid-template-columns:1fr 60px 80px 26px;gap:6px;align-items:center;margin-bottom:6px;}
.art-line input{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 8px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:100%;transition:border-color .15s;}
.art-line input:focus{border-color:var(--blue);}
.rm-line{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;transition:color .1s;}
.rm-line:hover{color:var(--red);}
.btn-add-line{background:none;border:1px dashed var(--border-strong);color:var(--muted);padding:8px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;width:100%;margin-top:6px;font-weight:500;transition:all .1s;}
.btn-add-line:hover{background:var(--surface);border-color:var(--blue);color:var(--blue);}
.d-total{text-align:right;font-size:14px;font-weight:700;color:var(--text);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;box-shadow:var(--shadow);}
.cal-nav .ml{font-size:15px;font-weight:700;color:var(--text);}
.cnnav{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:5px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;transition:all .1s;}
.cnnav:hover{background:var(--bg);color:var(--text);}
.btn-today{background:var(--blue);color:#fff;border:none;padding:6px 12px;border-radius:5px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;}
.cal-grid{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.cal-dow span{padding:9px 6px;text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--bg);}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day{min-height:88px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:6px 5px 4px;cursor:pointer;transition:background .1s;}
.cal-day:hover{background:#FBFBF9;}
.cal-day:nth-child(7n){border-right:none;}
.cal-day.other-month .dn{color:#C9C9C6;}
.cal-day.other-month{background:#FAFAF8;}
.cal-day.is-today .dn{background:var(--blue);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.dn{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-pills{display:flex;flex-direction:column;gap:2px;}
.cal-pill{border-radius:3px;padding:2px 5px;font-size:10px;font-weight:500;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.4;}
.cal-pill:hover{opacity:.8;}
.pill-planifiee{background:var(--blue-l);color:var(--blue);}
.pill-en_cours{background:var(--yellow-l);color:var(--yellow);}
.pill-terminee{background:var(--green-l);color:var(--green);}
.pill-annulee{background:var(--gray-l);color:var(--gray);}
.cal-more{font-size:10px;color:var(--blue);font-weight:500;margin-top:2px;}

/* BOTTOM NAV */
.bottom-nav{display:none;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--text);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--red);}

@media(min-width:701px){
  .overlay{align-items:center;padding:20px;}
  .modal{border-radius:10px;max-height:90vh;}
  .drag{display:none;}
  .cal-day{min-height:100px;}
}
@media(max-width:700px){
  .sidebar{display:none;}
  .main{padding:16px;padding-bottom:76px;}
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--sidebar);border-top:1px solid #2C2C2C;z-index:100;height:62px;}
  .bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#666;font-size:9px;font-weight:500;font-family:inherit;cursor:pointer;padding:6px 2px;border-top:2px solid transparent;}
  .bottom-nav button .ic{font-size:17px;display:flex;align-items:center;justify-content:center;}
  .bottom-nav button.active{color:#fff;border-top-color:var(--blue);}
  .stats-row{grid-template-columns:1fr 1fr;gap:8px;}
  .stat-card .val{font-size:22px;}
  .g2,.g3{grid-template-columns:1fr;}
  .art-line{grid-template-columns:1fr 50px 64px 24px;}
  .cal-day{min-height:64px;padding:4px 3px 2px;}
  .dn{font-size:11px;width:20px;height:20px;}
  .cal-pill{font-size:9px;}
}
/* COMBOBOX CLIENT */
.cs-wrap{position:relative;}
.cs-dropdown{display:none;position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;max-height:220px;overflow-y:auto;z-index:600;box-shadow:var(--shadow-md);}
.cs-dropdown.open{display:block;}
.cs-item{padding:8px 12px;font-size:13px;cursor:pointer;transition:background .08s;}
.cs-item:hover{background:var(--bg);}
.cs-selected{background:var(--blue-l)!important;color:var(--blue);}
.cs-empty{color:var(--muted);cursor:default;font-style:italic;}
.cs-empty:hover{background:transparent!important;}
/* Icônes nav SVG */
.nav-item .ic{font-size:15px;width:20px;text-align:center;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;}
/* Lignes cliquables */
tbody tr.clickable{cursor:pointer;}
/* Bouton save loading */
.btn-save:disabled{opacity:.75;cursor:wait;}
/* SORT */
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{color:var(--text);}
thead th .si{font-size:9px;margin-left:3px;opacity:.35;display:inline;}
thead th.sort-asc .si::after{content:'▲';opacity:1;}
thead th.sort-desc .si::after{content:'▼';opacity:1;}
thead th:not(.sort-asc):not(.sort-desc) .si::after{content:'⬍';}
/* PAGINATION */
.pg-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);font-size:12px;color:var(--muted);}
.pg-btns{display:flex;gap:4px;}
.pg-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:5px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .1s;}
.pg-btn:hover:not(:disabled){background:var(--bg);color:var(--text);}
.pg-btn:disabled{opacity:.35;cursor:default;}
/* DETAIL VIEW */
.detail-back{display:inline-flex;align-items:center;gap:5px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:16px;background:none;border:none;font-family:inherit;padding:0;transition:color .1s;}
.detail-back:hover{color:var(--text);}
.detail-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.detail-num{font-size:20px;font-weight:800;}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);}
.dcard-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.dfl{font-size:11px;color:var(--muted);font-weight:500;margin-bottom:2px;}
.dfv{font-size:13px;color:var(--text);font-weight:500;}
.dtable{width:100%;border-collapse:collapse;font-size:13px;}
.dtable th{padding:7px 10px;text-align:left;font-size:11px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
.dtable td{padding:8px 10px;border-bottom:1px solid var(--border);}
.dtable tr:last-child td{border-bottom:none;}
.dtotal{text-align:right;padding-top:10px;margin-top:4px;border-top:1px solid var(--border);}
.dtotal .ttc{font-size:18px;font-weight:800;color:var(--text);}

.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
.chart-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
@media(max-width:700px){.dgrid{grid-template-columns:1fr;}}

// ===== INIT =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; await loadProfil(); if (currentRole) await showApp(); }
  else { showLogin(); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) { currentUser = session.user; await loadProfil(); if (currentRole) await showApp(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; currentRole = null; showLogin(); }
  });
}

async function doGoogleLogin() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (error) alert('Google non activé dans Supabase.');
}

async function doLogin() {
  const email = (document.getElementById('le').value || '').trim();
  const password = document.getElementById('lp').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Email et mot de passe requis.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Connexion…'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = 'Email ou mot de passe incorrect.';
    errEl.style.display = 'block';
    btn.textContent = 'Se connecter'; btn.disabled = false;
  }
}

async function doLogout() {
  await sb.auth.signOut();
}

const TABS = ['dashboard','clients','articles','interventions','devis','factures','settings'];
function goTab(name) {
  if (currentRole && !ROLE_TABS[currentRole].includes(name)) return;
  TABS.forEach(t => { const el = document.getElementById('tab-'+t); if (el) el.classList.toggle('active', t===name); });
  document.querySelectorAll('.sidebar .nav-item[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab===name));

function gv(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
function sv(id, v) { const el = document.getElementById(id); if (el) el.value = (v === null || v === undefined) ? '' : v; }
function fmt(n) { return Number(n||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

// ===== SORT =====
const SORT_EXT = {
  clients: {nom:c=>(c.nom||'').toLowerCase(), type:c=>c.type||'', telephone:c=>c.telephone||'', email:c=>c.email||'', emirat:c=>c.emirat||''},
  articles: {reference:a=>a.reference||'', designation:a=>(a.designation||'').toLowerCase(), categorie:a=>(a.categories_article?.nom||'').toLowerCase(), prix_vente_ht:a=>Number(a.prix_vente_ht||0), stock_actuel:a=>Number(a.stock_actuel||0)},
  interventions: {numero:i=>i.numero||'', client:i=>clientName(i.clients).toLowerCase(), type:i=>i.type||'', date_debut:i=>i.date_debut||'', statut:i=>i.statut||''},
  devis: {numero:d=>d.numero||'', client:d=>clientName(d.clients).toLowerCase(), objet:d=>(d.objet||'').toLowerCase(), total_ttc:d=>Number(d.total_ttc||0), statut:d=>d.statut||''},
  factures: {numero:f=>f.numero||'', client:f=>clientName(f.clients).toLowerCase(), objet:f=>(f.objet||'').toLowerCase(), total_ttc:f=>Number(f.total_ttc||0), statut:f=>f.statut||''},
};
function getSort(mod){return sortState[mod]||{col:null,dir:'asc'};}
function applySort(list,mod){const{col,dir}=getSort(mod);if(!col)return list;const ext=SORT_EXT[mod]?.[col];if(!ext)return list;return[...list].sort((a,b)=>{let av=ext(a),bv=ext(b);if(av<bv)return dir==='asc'?-1:1;if(av>bv)return dir==='asc'?1:-1;return 0;});}
function clickSort(mod,col){const s=getSort(mod);sortState[mod]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc'};pageState[mod]=1;if(mod==='clients')renderClients();else if(mod==='articles')renderArticles();else if(mod==='interventions')renderInterventions();else if(mod==='devis')renderDevis();else if(mod==='factures')renderFactures();}
function thS(mod,col,lbl){const s=getSort(mod);const cls=s.col===col?`sort-${s.dir}`:'';return `<th class="sortable ${cls}" onclick="clickSort('${mod}','${col}')">${lbl}<span class="si"></span></th>`;}
// ===== PAGINATION =====
function pgSlice(list,mod){const p=pageState[mod]||1;return list.slice((p-1)*PAGE_SIZE,p*PAGE_SIZE);}
function pgBar(mod,total){const p=pageState[mod]||1;const pages=Math.ceil(total/PAGE_SIZE);if(pages<=1)return '';return `<div class="pg-bar"><span>${total} entrée${total>1?'s':''} — page ${p}/${pages}</span><div class="pg-btns"><button class="pg-btn" onclick="goPage('${mod}',${p-1})" ${p>1?'':'disabled'}>← Préc.</button><button class="pg-btn" onclick="goPage('${mod}',${p+1})" ${p<pages?'':'disabled'}>Suiv. →</button></div></div>`;}
function goPage(mod,p){pageState[mod]=p;if(mod==='clients')renderClients();else if(mod==='articles')renderArticles();else if(mod==='interventions')renderInterventions();else if(mod==='devis')renderDevis();else if(mod==='factures')renderFactures();}

// ===== BOUTON LOADING =====
function setBtnLoading(btn, on) {
  if (!btn) return;
  if (on) {
    btn.disabled = true;
    btn._origHtml = btn.innerHTML;
    btn.innerHTML = '<span class="spinner" style="width:13px;height:13px;border-width:2px;margin-right:6px;display:inline-block;vertical-align:middle"></span>Enregistrement…';
  } else {
    btn.disabled = false;

  }
}

function fillClientCombo(hiddenId, currentId) {
  const textEl = document.getElementById('cs-' + hiddenId + '-text');
  const listEl = document.getElementById('cs-' + hiddenId + '-list');
  const hiddenEl = document.getElementById(hiddenId);
  if (!textEl || !listEl || !hiddenEl) return;
  hiddenEl.value = currentId || '';
  const cur = S.clients.find(c => c.id === currentId);
  textEl.value = cur ? (cur.nom + (cur.prenom ? ' ' + cur.prenom : '') + (cur.entreprise ? ' — ' + cur.entreprise : '')) : '';
  listEl.classList.remove('open');
  const render = q => {
    const f = q ? S.clients.filter(c => `${c.nom} ${c.prenom||''} ${c.entreprise||''}`.toLowerCase().includes(q.toLowerCase())) : S.clients;
    listEl.innerHTML = f.length
      ? f.map(c => `<div class="cs-item${c.id===hiddenEl.value?' cs-selected':''}" data-id="${c.id}">${c.nom}${c.prenom?' '+c.prenom:''}${c.entreprise?'<span style="color:var(--muted);font-size:12px"> — '+c.entreprise+'</span>':''}</div>`).join('')
      : '<div class="cs-item cs-empty">Aucun résultat</div>';
  };
  textEl.oninput = () => { render(textEl.value); listEl.classList.add('open'); };
  textEl.onfocus = () => { render(textEl.value); listEl.classList.add('open'); };
  textEl.onblur = () => setTimeout(() => listEl.classList.remove('open'), 150);
  listEl.onmousedown = e => {
    e.preventDefault();
    const item = e.target.closest('[data-id]');
    if (!item) return;
    hiddenEl.value = item.dataset.id;
    const c = S.clients.find(x => x.id === item.dataset.id);
    textEl.value = c ? (c.nom + (c.prenom ? ' ' + c.prenom : '') + (c.entreprise ? ' — ' + c.entreprise : '')) : '';
    listEl.classList.remove('open');
    render('');
  };
}

// ===== DASHBOARD =====
function renderDashboard() {
  const panel = document.getElementById('tab-dashboard');
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const curYear = now.getFullYear(), curMonth = now.getMonth();
  const prevMonth = curMonth === 0 ? 11 : curMonth - 1;
  const prevYear = curMonth === 0 ? curYear - 1 : curYear;

  const intervAujourd = S.interventions.filter(i => i.date_debut && i.date_debut.startsWith(todayStr));
  const facturesRetard = S.factures.filter(f => f.statut === 'en_retard');
  const devisEnCours = S.devis.filter(d => d.statut === 'brouillon' || d.statut === 'envoye');

  const caMois = (y, m) => S.factures
    .filter(f => f.statut === 'payee' && f.created_at)
    .filter(f => { const d = new Date(f.created_at); return d.getFullYear() === y && d.getMonth() === m; })
    .reduce((s, f) => s + Number(f.total_ttc || 0), 0);

  const caCurrentMonth = caMois(curYear, curMonth);
  const caPrevMonth = caMois(prevYear, prevMonth);
  const caTrend = caPrevMonth > 0 ? Math.round((caCurrentMonth - caPrevMonth) / caPrevMonth * 100) : null;

  const intervMois = (y, m) => S.interventions.filter(i => {
    if (!i.date_debut) return false;
    const d = new Date(i.date_debut);
    return d.getFullYear() === y && d.getMonth() === m;
  }).length;
  const intervCurMonth = intervMois(curYear, curMonth);
  const intervPrevMonth = intervMois(prevYear, prevMonth);
  const intervTrend = intervPrevMonth > 0 ? Math.round((intervCurMonth - intervPrevMonth) / intervPrevMonth * 100) : null;

  function trendHtml(trend) {
    if (trend === null) return '<div class="sub">— vs mois précédent</div>';
    const up = trend >= 0;
    return `<div class="sub" style="color:${up ? 'var(--green)' : 'var(--red)'}">${up ? '↑' : '↓'} ${Math.abs(trend)}% vs mois préc.</div>`;
  }

  const last12 = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(curYear, curMonth - i, 1);
    last12.push({ label: d.toLocaleDateString('fr-FR', { month: 'short', year: '2-digit' }), ca: caMois(d.getFullYear(), d.getMonth()) });
  }

  panel.innerHTML = `
    <div class="page-title">Tableau de bord</div>
    <div class="stats-row">
      <div class="stat-card" onclick="goTab('factures')">
        <div class="lbl">CA ce mois (AED)</div>
        <div class="val" style="font-size:20px">${fmt(caCurrentMonth)}</div>
        ${trendHtml(caTrend)}
      </div>
      <div class="stat-card" onclick="goTab('interventions')">
        <div class="lbl">Interventions (mois)</div>
        <div class="val">${intervCurMonth}</div>
        ${trendHtml(intervTrend)}
      </div>
      <div class="stat-card" onclick="goTab('devis')">
        <div class="lbl">Devis en cours</div>
        <div class="val">${devisEnCours.length}</div>
        <div class="sub">brouillon + envoyé</div>
      </div>
      <div class="stat-card" onclick="goTab('factures')">
        <div class="lbl">Factures en retard</div>
        <div class="val" style="color:${facturesRetard.length > 0 ? 'var(--red)' : 'var(--green)'}">${facturesRetard.length}</div>
        <div class="sub" style="color:${facturesRetard.length > 0 ? 'var(--red)' : 'var(--green)'}">${facturesRetard.length > 0 ? 'à relancer' : 'tout est à jour'}</div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-t">CA encaissé — 12 derniers mois (AED)</div>
      <div style="height:180px;position:relative"><canvas id="ca-chart"></canvas></div>
    </div>
    ${intervAujourd.length > 0 ? `
    <div class="table-card" style="margin-bottom:10px">
      <div class="table-header"><h3>Interventions du jour (${intervAujourd.length})</h3></div>
      <div class="tscroll"><table>
        <thead><tr><th>N°</th><th>Client</th><th>Type</th><th>Statut</th><th></th></tr></thead>
        <tbody>${intervAujourd.map(i => `<tr>
          <td><strong>${i.numero}</strong></td><td>${clientName(i.clients)}</td>
          <td>${bTypeInterv(i.type)}</td><td>${bStatutInterv(i.statut)}</td>
          <td><button class="act blue" onclick="openEditInterv('${i.id}')">Modifier</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}
    ${facturesRetard.length > 0 ? `
    <div class="table-card" style="margin-bottom:10px">
      <div class="table-header"><h3>Factures en retard (${facturesRetard.length})</h3></div>
      <div class="tscroll"><table>
        <thead><tr><th>N°</th><th>Client</th><th>Montant TTC</th><th></th></tr></thead>
        <tbody>${facturesRetard.map(f => `<tr>
          <td><strong>${f.numero}</strong></td><td>${clientName(f.clients)}</td>
          <td><strong>${fmt(f.total_ttc)} AED</strong></td>
          <td><button class="act blue" onclick="openEditFacture('${f.id}')">Voir</button></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>` : ''}
    <div class="stats-row">
      <div class="stat-card" onclick="goTab('clients')"><div class="lbl">Clients actifs</div><div class="val">${S.clients.length}</div><div class="sub">au total</div></div>
      <div class="stat-card" onclick="goTab('interventions')"><div class="lbl">Interventions</div><div class="val">${S.interventions.length}</div><div class="sub">au total</div></div>
      <div class="stat-card" onclick="goTab('articles')"><div class="lbl">Articles</div><div class="val">${S.articles.length}</div><div class="sub">en catalogue</div></div>
    </div>
  `;
  setTimeout(() => initCAChart(last12), 0);
}

function initCAChart(data) {
  const canvas = document.getElementById('ca-chart');
  if (!canvas || typeof Chart === 'undefined') return;
  if (window._caChart) { window._caChart.destroy(); window._caChart = null; }
  window._caChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: data.map(m => m.label),
      datasets: [{ data: data.map(m => m.ca), backgroundColor: 'rgba(35,131,226,0.15)', borderColor: 'rgba(35,131,226,0.8)', borderWidth: 2, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.raw) + ' AED' } } },
      scales: {
        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { callback: v => fmt(v), font: { size: 10 } } },
        x: { grid: { display: false }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

function renderCalendar() {
  const year = calDate.getFullYear(), month = calDate.getMonth();
  const mNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const first = new Date(year,month,1), last = new Date(year,month+1,0);
  let startDow = first.getDay(); if (startDow===0) startDow=7;
  const todayStr = new Date().toISOString().split('T')[0];
  let days = '';
  for (let i=1; i<startDow; i++) {
    const d = new Date(year,month,1-startDow+i);
    days += `<div class="cal-day other-month"><div class="dn">${d.getDate()}</div></div>`;
  }
  for (let d=1; d<=last.getDate(); d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const di = S.interventions.filter(i => i.date_debut && i.date_debut.startsWith(ds));
    days += `<div class="cal-day${ds===todayStr?' is-today':''}" onclick="openNewIntervDate('${ds}')">
      <div class="dn">${d}</div>
      <div class="cal-pills">
        ${di.slice(0,3).map(i=>`<div class="cal-pill pill-${i.statut}" onclick="event.stopPropagation();openEditInterv('${i.id}')">${clientName(i.clients)}</div>`).join('')}
        ${di.length>3?`<div class="cal-more">+${di.length-3} autre(s)</div>`:''}
      </div>
    </div>`;
  }
  const endDow = last.getDay();
  for (let i=1; i<=(endDow===0?0:7-endDow); i++) days += `<div class="cal-day other-month"><div class="dn">${i}</div></div>`;
  return `
    <div class="cal-nav">
      <button class="cnnav" onclick="calPrev()">&#9664;</button>
      <div class="ml">${mNames[month]} ${year}</div>
      <button class="btn-today" onclick="calToday()">Aujourd'hui</button>
      <button class="cnnav" onclick="calNext()">&#9654;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow"><span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span></div>
      <div class="cal-days">${days}</div>
    </div>`;
}
function calPrev() { calDate.setMonth(calDate.getMonth()-1); renderInterventions(); }
function calNext() { calDate.setMonth(calDate.getMonth()+1); renderInterventions(); }

  }
  await sb.from('facture_lignes').delete().eq('facture_id', factureId);
  if (fLignes.length) {
    await sb.from('facture_lignes').insert(fLignes.map((l,i) => {
      const ht = Number(l.qte)*Number(l.prix);
      return {facture_id:factureId, designation:l.designation, quantite:Number(l.qte),
        prix_unitaire_ht:Number(l.prix), taux_tva:5, montant_ht:ht, montant_tva:ht*0.05, montant_ttc:ht*1.05, ordre:i};
    }));
  }
  setBtnLoading(btn, false);
  closeOv('facture'); await loadFactures(); renderFactures();
  toast(editId.facture ? 'Facture modifiée ✓' : 'Facture créée ✓');
}
async function deleteFacture() {
  if (!editId.facture) return;
  showConfirm('Supprimer cette facture et toutes ses lignes ?', async () => {
    await sb.from('facture_lignes').delete().eq('facture_id', editId.facture);
    const { error } = await sb.from('factures').delete().eq('id', editId.facture);
    if (error) { toast('Erreur',true); return; }
    closeOv('facture'); await loadFactures(); renderFactures(); toast('Facture supprimée');
  });
}

// ===== SETTINGS =====
async function renderSettings() {
  const el = document.getElementById('tab-settings');
  if (!el) return;
  if (currentRole !== 'administrateur') { el.innerHTML = '<div style="padding:40px;color:var(--muted)">Accès refusé.</div>'; return; }
  await loadAllProfils();
  const roles = ['administrateur','technicien','comptable','commercial'];
  const rows = S.allProfils.map(p => {
    const isSelf = p.id === currentUser.id;
    const opts = roles.map(r => `<option value="${r}"${p.role===r?' selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('');
    return `<tr>
      <td style="padding:11px 14px;font-size:13px;color:var(--text)">${p.email || p.id.substring(0,12)+'…'}</td>
      <td style="padding:11px 14px">
        <select data-uid="${p.id}" onchange="saveUserRole('${p.id}',this.value)"
          style="background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 10px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;"
          ${isSelf ? 'disabled title="Votre propre compte"' : ''}>
          ${opts}
        </select>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <div class="page-title">Paramètres — Utilisateurs</div>
    <div class="table-card">
      <div class="tscroll"><table>
        <thead><tr><th>Utilisateur</th><th>Rôle</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}
async function saveUserRole(userId, newRole) {
  if (currentRole !== 'administrateur') { toast('Accès refusé', true); return; }
  if (userId === currentUser.id) {
    const adminCount = S.allProfils.filter(p => p.role === 'administrateur').length;
    if (adminCount <= 1) { toast('Impossible : vous êtes le seul administrateur', true); await renderSettings(); return; }
  }
  const { error } = await sb.from('profils').update({ role: newRole }).eq('id', userId);
  if (error) { toast('Erreur lors de la mise à jour', true); return; }
  const p = S.allProfils.find(p => p.id === userId);
  if (p) p.role = newRole;
  toast('Rôle mis à jour');
}

// ===== LIGNES =====
function getLignes(type) { return type==='devis' ? dLignes : fLignes; }
function setLignes(type, arr) { if (type==='devis') dLignes=arr; else fLignes=arr; }
function renderLignes(type) {
  const lignes = getLignes(type);
  const cEl = document.getElementById(type==='devis'?'d-lignes':'f-lignes');
  const tEl = document.getElementById(type==='devis'?'d-total':'f-total');
  if (!cEl) return;
  cEl.innerHTML = lignes.map((l,i)=>`
    <div class="art-line">
      <input type="text" value="${l.designation||''}" placeholder="Désignation…" oninput="updateLigne('${type}',${i},'designation',this.value)">
      <input type="number" value="${l.qte||1}" min="0.01" step="0.01" placeholder="Qté" oninput="updateLigne('${type}',${i},'qte',this.value)">
      <input type="number" value="${l.prix||0}" min="0" step="0.01" placeholder="Prix HT" oninput="updateLigne('${type}',${i},'prix',this.value)">
      <button class="rm-line" onclick="removeLigne('${type}',${i})">×</button>
    </div>`).join('');
  if (tEl) tEl.textContent = `Total TTC (TVA 5%) : ${fmt(calcTotals(type).ttc)} AED`;
}
function addLigne(type) { getLignes(type).push({designation:'',qte:1,prix:0}); renderLignes(type); }
function removeLigne(type, i) { getLignes(type).splice(i,1); renderLignes(type); }
function updateLigne(type, i, field, val) {
  getLignes(type)[i][field] = val;
  const tEl = document.getElementById(type==='devis'?'d-total':'f-total');
  if (tEl) tEl.textContent = `Total TTC (TVA 5%) : ${fmt(calcTotals(type).ttc)} AED`;
}
function calcTotals(type) {
  const ht = getLignes(type).reduce((s,l) => s + Number(l.qte||0)*Number(l.prix||0), 0);
  return { ht, tva: ht*0.05, ttc: ht*1.05 };
}
