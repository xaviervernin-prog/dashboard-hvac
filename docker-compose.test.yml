services:
  api:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - .env.test
    environment:
      ENVIRONMENT: test
      DEBUG: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
