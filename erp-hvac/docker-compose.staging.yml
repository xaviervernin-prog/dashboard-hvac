version: '3.9'

# Stack staging — test avant mise en production
# Usage : docker compose -f docker-compose.staging.yml up -d --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3000
      SUPABASE_URL: ${STAGING_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${STAGING_SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${STAGING_SUPABASE_ANON_KEY}
      DATABASE_URL: ${STAGING_DATABASE_URL}
      JWT_SECRET: ${STAGING_JWT_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
    networks:
      - staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"       # Staging accessible sur port 8080 (pas de SSL en local)
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - staging
    depends_on:
      backend:
        condition: service_healthy

networks:
  staging:
