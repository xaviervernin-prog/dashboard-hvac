<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ERP Dubai</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1d27">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="/css/base.css">
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <h1>🔧 ERP Dubai</h1>
  <div class="topbar-right">
    <span class="topbar-date" id="topbar-date"></span>
    <button class="bell-btn" id="bell-btn" title="Notifications">
      🔔<span class="bell-badge" id="bell-badge"></span>
    </button>
    <button class="avatar-btn" id="avatar-btn" title="Mon profil">
      <span id="avatar-initials">?</span>
    </button>
  </div>
</div>

<!-- NOTIFICATION PANEL -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-header">
    <span class="notif-title">Notifications</span>
    <button class="notif-close" onclick="document.getElementById('notif-panel').classList.remove('open')">×</button>
  </div>
  <div id="notif-list"><div class="notif-empty">Aucune notification</div></div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-lbl">Activité</div>
    <button class="nav-item active" data-tab="dashboard"><span class="ic">📊</span><span>Tableau de bord</span></button>
    <button class="nav-item" data-tab="agenda"><span class="ic">📅</span><span>Agenda</span></button>
    <button class="nav-item" data-tab="clients"><span class="ic">👤</span><span>Clients</span></button>
    <button class="nav-item" data-tab="articles"><span class="ic">🔧</span><span>Articles</span></button>
    <button class="nav-item" data-tab="devis"><span class="ic">📋</span><span>Devis</span></button>
    <button class="nav-item" data-tab="factures"><span class="ic">💰</span><span>Facturation</span></button>

    <div class="sidebar-lbl" style="margin-top:8px">Équipe</div>
    <button class="nav-item" data-tab="rh" data-roles="administrateur,commercial"><span class="ic">👥</span><span>RH / Équipe</span></button>
    <button class="nav-item" data-tab="vehicules" data-roles="administrateur,commercial"><span class="ic">🚗</span><span>Véhicules</span></button>

    <div class="sidebar-lbl" style="margin-top:8px">Finance</div>
    <button class="nav-item" data-tab="achats" data-roles="administrateur,comptable"><span class="ic">🛒</span><span>Achats</span></button>
    <button class="nav-item" data-tab="comptabilite" data-roles="administrateur,comptable"><span class="ic">📈</span><span>Comptabilité</span></button>

    <div class="sidebar-lbl" style="margin-top:8px">Croissance</div>
    <button class="nav-item" data-tab="marketing" data-roles="administrateur,commercial"><span class="ic">📣</span><span>Marketing</span></button>

    <div class="sidebar-lbl" style="margin-top:8px">Système</div>
    <button class="nav-item" data-tab="suggestions"><span class="ic">💡</span><span>Suggestions</span></button>
    <button class="nav-item" id="logout-btn"><span class="ic">🚪</span><span>Déconnexion</span></button>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div id="tab-dashboard" class="tab-panel active"></div>
    <div id="tab-agenda" class="tab-panel"></div>
    <div id="tab-clients" class="tab-panel"></div>
    <div id="tab-articles" class="tab-panel"></div>
    <div id="tab-devis" class="tab-panel"></div>
    <div id="tab-factures" class="tab-panel"></div>
    <div id="tab-rh" class="tab-panel"></div>
    <div id="tab-vehicules" class="tab-panel"></div>
    <div id="tab-achats" class="tab-panel"></div>
    <div id="tab-comptabilite" class="tab-panel"></div>
    <div id="tab-marketing" class="tab-panel"></div>
    <div id="tab-suggestions" class="tab-panel"></div>
  </main>
</div>

<!-- MODAL OVERLAY -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>

<!-- TOAST CONTAINER -->
<div id="toast"></div>

<!-- SCRIPTS -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/modules/dashboard.js"></script>
<script src="/js/modules/clients.js"></script>
<script src="/js/modules/articles.js"></script>
<script src="/js/modules/devis.js"></script>
<script src="/js/modules/interventions.js"></script>
<script src="/js/modules/factures.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
