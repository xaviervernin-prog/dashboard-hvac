version: '3.9'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    environment:
      NODE_ENV: development
      FRONTEND_URL: "http://localhost"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
