name: Bug
description: Signaler un bug
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que se passe-t-il exactement ?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Qu'est-ce qui devrait se passer ?

  - type: dropdown
    id: module
    attributes:
      label: Module concerné
      options:
        - Clients
        - Articles
        - Devis
        - Facturation
        - Agenda
        - Core / Infrastructure
        - Frontend
        - Autre
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environnement
      options:
        - Production (VPS)
        - Test
        - Local
